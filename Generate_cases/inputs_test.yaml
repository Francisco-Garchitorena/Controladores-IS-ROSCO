#------------------------------------------FLAGS FOR USER SELECTION-------------------------------#
First_time: false                                                                                 # If true, the "General" and "Wind "Folder will be created.
Generate_Wind_files: false                                                                          # If true, the wind files will be generated.
Copy_Wind_folder: false                                                                           # If user already has a DLCs Wind Folder created, copy it to present directory.
Generate_input_files: false
Run_DLCs: false                                                                                    # If true OpenFast will be executed for each case. 
post_process: true                                                                                # If true the simulations will be post-processed to obtain the life time weighted DEL of certain variables.
Wind_user_choice: false
Same_seed: True                                                                                   # If false, every simulation will have a different seed. If true, only n_seeds will be used.                        
Use_Weibull: True                                                                                 # If true, the Weibull distribution will be used to generate the wind speed distribution.
save_results_pickle: True                                                                        # If true, the post-processed results will be saved as a pickle file. Beware: results can weight up to 8GB.
mean_or_max_sd_weigh_var: mean                                                                    # Select whether to weigh the max values per seed by the mean(max) or by max(max).
Gen_plot_del_vs_speed: True                                                                           # If true, the DELs will be plotted against the wind speed.   
Gen_plot_pot_vs_speed: True                                                                           # If true, the mean power will be plotted against the wind speed.    
Gen_plot_max_value_var_vs_speed: False                                 # If true, the maximum value of the variable will be plotted against the wind speed.
Gen_plot_Lifetime_del_comparison: True                                # If true, the lifetime DELs will be compared.
