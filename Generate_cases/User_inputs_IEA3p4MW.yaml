Generate_Wind_files: false                                                        # If true, the wind files will be generated.
Generate_input_files: True                                                        # If true, the input files will be generated.
Run_DLCs: True                                                                    # If true OpenFast will be executed for each case. 
post_process: True                                                                # If true the simulations will be post-processed. Set the characteristics in the "POST-PROCESSING" section. 

#--- POST-PROCESSING AND SIMULATION SELECTIONS -------------------------------#
